<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanchonete App - Atendente</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body>

    <header>
        <h1>🍔 Lanchonete - Atendimento</h1>
        <div class="header-info">
            <button onclick="sair()">Sair</button>
        </div>
    </header>

    <main class="container">
        <section class="welcome-section">
            <h2 id="welcomeMessage">Bem-vindo Atendente</h2>
            <p>Gerencie o atendimento e pedidos dos clientes.</p>
        </section>

        <section class="dashboard">
            <div class="menu-item">
                <h3>🛒 Novo Pedido</h3>
                <p>Crie um novo pedido para cliente.</p>
            </div>
            <div class="menu-item">
                <h3>📋 Pedidos Ativo</h3>
                <p>Visualize os pedidos em andamento.</p>
            </div>
            <div class="menu-item">
                <h3>🏁 Retirada</h3>
                <p>Gerenciar retirada de pedidos prontos.</p>
            </div>
        </section>

    </main>

    <script src="../js/services/dataService.js"></script>
    <script src="../js/utils/storage.js"></script>
    <script src="../js/auth/auth.js"></script>
    <script src="../js/pages/atendente.js"></script>
</body>

</html>
