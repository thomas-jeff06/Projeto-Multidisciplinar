<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanchonete App - Cozinheiro</title>
    <link rel="stylesheet" href="../styles/style.css">
</head>

<body>

    <header>
        <h1>🍔 Lanchonete - Cozinha</h1>
        <div class="header-info">
            <button onclick="sair()">Sair</button>
        </div>
    </header>

    <main class="container">
        <section class="welcome-section">
            <h2 id="welcomeMessage">Bem-vindo Cozinheiro</h2>
            <p>Gerencie todos os pedidos da sua lanchonete.</p>
        </section>

        <!-- Seção de Pedidos em Tabela -->
        <section id="pedidos-section" class="cozinheiro-section">
            <h2>📋 Pedidos da Lanchonete</h2>
            <div class="tabela-container">
                <table class="pedidos-tabela">
                    <thead>
                        <tr>
                            <th>ID Pedido</th>
                            <th>Cliente</th>
                            <th>Itens</th>
                            <th>Total</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="pedidos-tbody">
                        <!-- Pedidos serão inseridos aqui dinamicamente -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>

    <script src="../js/services/dataService.js"></script>
    <script src="../js/utils/storage.js"></script>
    <script src="../js/auth/auth.js"></script>
    <script src="../js/pages/cozinheiro.js"></script>
</body>

</html>
