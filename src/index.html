<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanchonete App - Login</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>

    <!-- LOGIN -->
    <section id="login" class="login-section">
        <h1>🍔 Lanchonete App</h1>
        <h2>Login</h2>
        <form onsubmit="handleLogin(event)">
            <input type="text" id="username" placeholder="Usuário" required>
            <input type="password" id="password" placeholder="Senha" required>
            <button type="submit">Entrar</button>
        </form>
        <p id="mensagemErro" class="erro"></p>
        <button type="button" onclick="irParaCadastro()" style="margin-top: 15px;">Criar Conta</button>
    </section>

    <!-- CADASTRO -->
    <section id="cadastro" class="cadastro-section hidden">
        <h1>🍔 Lanchonete App</h1>
        <h2>Criar Conta</h2>
        <form onsubmit="handleCadastro(event)">
            <input type="text" id="cadastroUsername" placeholder="Nome de Usuário" required>
            <input type="email" id="cadastroEmail" placeholder="Email" required>
            <input type="password" id="cadastroPassword" placeholder="Senha" required>
            <input type="password" id="cadastroConfirmPassword" placeholder="Confirmar Senha" required>
            <button type="submit">Cadastrar</button>
        </form>
        <p id="mensagemCadastroErro" class="erro"></p>
        <p id="mensagemCadastroSucesso" class="sucesso"></p>
        <button type="button" onclick="voltarParaLogin()" style="margin-top: 15px; background: #999;">Voltar</button>
    </section>

    <!-- LGPD -->
    <div id="lgpd" class="lgpd hidden">
        <p>Usamos seus dados para melhorar sua experiência.</p>
        <button onclick="handleLGPD()">Aceitar</button>
    </div>

    <script src="js/services/dataService.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/auth/auth.js"></script>
    <script src="js/auth/login.js"></script>
</body>

</html>
